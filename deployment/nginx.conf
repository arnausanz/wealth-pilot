# WealthPilot — Nginx config per a Oracle Cloud VM
# Reemplaça DOMAIN_PLACEHOLDER pel teu domini sslip.io (ex: 152-70-45-123.sslip.io)
#
# Còpia a: /etc/nginx/sites-available/wealthpilot
# Activa amb: sudo ln -s /etc/nginx/sites-available/wealthpilot /etc/nginx/sites-enabled/wealthpilot
# Testa amb: sudo nginx -t
# Aplica amb: sudo systemctl reload nginx

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Permetre challenge ACME per a certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # SSL modern (certbot genera include automàticament)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Frontend — Vite build estàtic
    root /opt/wealthpilot/dist;
    index index.html;

    # ── Backend API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Service Worker ─────────────────────────────────────────────────────────
    location = /service-worker.js {
        root /opt/wealthpilot/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Icones i manifest PWA ──────────────────────────────────────────────────
    location ~* \.(webmanifest|json)$ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Assets Vite amb hash (immutables) ─────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Imatges, fonts, icones ────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compressió ────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm font/woff2;
    gzip_min_length 1024;
    gzip_vary on;
}
