# Producció — Oracle Cloud VM
# Còpia a: /etc/nginx/sites-available/wealthpilot
# Activa amb: ln -s /etc/nginx/sites-available/wealthpilot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Substituir pel domini quan estigui disponible

    # Redirigir a HTTPS quan hi hagi domini + certbot
    # return 301 https://$host$request_uri;

    root /opt/wealthpilot/app/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers de seguretat
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

