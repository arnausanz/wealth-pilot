server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Permet uploads fins a 110 MB (ZIP de MoneyWiz ~38 MB; marge ampli)
    client_max_body_size 110m;

    # Timeout extens per a l'upload de MoneyWiz (parsing del ZIP pot trigar uns segons)
    location /api/v1/sync/upload {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy API cap al backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback: totes les rutes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressiu per a assets estatics
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
